<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de idade: anos, meses, dias e aniversário</title>
    <link
      rel="icon"
      type="image/png"
      href="./assets/icons/favicon.png"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="calculator.js" defer></script>
    <script src="index.js" defer></script>
  </head>
  <body>
    <div class="body-container">
      <section class="calculate-age">
        <header>
          <h1>Calcular Idade</h1>
          <span>Cálculo rápido e preciso da sua idade</span>
        </header>

        <section class="age-form-container">
          <div class="age-info-container">
            <form class="form-input-container">
              <div class="input-container">
                <label for="day">Dia</label>
                <select
                  class="input-form"
                  name="day"
                  id="day"
                ></select>
              </div>

              <div class="input-container">
                <label for="month">Mês</label>
                <select
                  class="input-form"
                  name="month"
                  id="month"
                ></select>
              </div>

              <div class="input-container">
                <label for="year">Ano</label>
                <div class="error">
                  <input
                    placeholder="Exemplo: 2000"
                    class="input-form"
                    inputmode="numeric"
                    maxlength="4"
                    type="text"
                    name="year"
                    id="year"
                  />
                  <span class="hidden-info" id="error">
                    Por favor, insira um valor válido.
                  </span>
                </div>
              </div>
            </form>
          </div>

          <div class="age-result-container">
            <div class="result-container">
              <div class="result">
                <span class="result-label">Idade</span>
                <span id="year-value">0 Anos</span>
              </div>
              <div class="result">
                <span class="result-label">Mês</span>
                <span id="month-value">0 Meses</span>
              </div>
              <div class="result">
                <span class="result-label">Dia</span>
                <span id="day-value">0 Dias</span>
              </div>
              <div class="result">
                <span class="result-label">Aniversário</span>
                <span id="birthday-value">0 Dias</span>
              </div>
            </div>
          </div>
        </section>

        <button type="button" id="btn-calculate">Calcular</button>
      </section>
    </div>

  </body>
</html>
